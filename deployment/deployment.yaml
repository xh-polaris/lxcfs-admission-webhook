apiVersion: apps/v1
kind: Deployment
metadata:
  name: lxcfs-admission-webhook
  namespace: lxcfs
spec:
  progressDeadlineSeconds: 600
  replicas: 3
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: lxcfs-admission-webhook
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: lxcfs-admission-webhook
      namespace: lxcfs
    spec:
      containers:
        - image: xhpolaris/lxcfs-admission-webhook:v1
          imagePullPolicy: IfNotPresent
          name: webhook
          ports:
            - containerPort: 443
              name: https
              protocol: TCP
          resources:
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /etc/webhook/certs
              name: vol-hpgcr
              readOnly: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
        - name: vol-hpgcr
          secret:
            defaultMode: 420
            secretName: lxcfs-admission-webhook-crt