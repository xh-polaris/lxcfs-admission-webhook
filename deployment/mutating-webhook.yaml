apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: lxcfs/lxcfs-admission-webhook-crt.yaml
  labels:
    app: lxcfs-admission-webhook
  name: mutating-lxcfs-admission-webhook-cfg
webhooks:
  - admissionReviewVersions:
      - v1beta1
    clientConfig:
      service:
        name: lxcfs-admission-webhook
        namespace: lxcfs
        path: /mutate
        port: 443
    failurePolicy: Fail
    matchPolicy: Equivalent
    name: mutating.lxcfs-admission-webhook.xhpolaris.com
    namespaceSelector:
      matchExpressions:
        - key: lxcfs-admission-webhook
          operator: NotIn
          values:
            - disabled
    objectSelector: {}
    reinvocationPolicy: Never
    rules:
      - apiGroups:
          - core
          - ''
        apiVersions:
          - v1
        operations:
          - CREATE
        resources:
          - pods
        scope: '*'
    sideEffects: None
    timeoutSeconds: 10
